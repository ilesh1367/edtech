services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coursevault-backend
    restart: always
    environment:
      # These will be read from a .env file on your VPS
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    ports:
      - "3000:3000"
    volumes:
      # Persist temp videos so they survive container restarts during processing
      - temp_videos:/app/temp_videos

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the public URL of your backend API
        - VITE_API_URL=https://api.yourdomain.com/api
    container_name: coursevault-frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  temp_videos: